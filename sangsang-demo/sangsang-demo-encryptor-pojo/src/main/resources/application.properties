#=======================================================================================================================
server.port=8002
spring.application.name=encryptor-pojo
#=======================================================================================================================
#引入公共的配置
spring.config.import[0]=optional:classpath:application-common.properties
#=======================================================================================================================
# sangsang
#扫描@TableName的路径
sangsang.scanEntityPackage[0]=com.sangsang.demo.*.entity
#开启自动加解密功能，并设置模式是pojo
sangsang.encryptor.patternType=pojo
#自定义秘钥
sangsang.encryptor.secretKey=tired-of-the-water
#=======================================================================================================================